; always_use_custom_rotation - instead of using player camera as rotation source, uses a custom function
; It allows more control over camera rotation
; If always_use_custom_rotation = 0, some features won't work or may work incorrectly (e.g. freeze_game, roll rotation)
[freecam]
hide_hud = 1
freeze_game = 1
freeze_entities = 1
freeze_player = 1
disable_player_controls = 1
reset_camera_settings = 1
always_use_custom_rotation = 1

[camera_settings]
sensitivity = 0.5
default_speed = 10.0
tilt_speed = 0.5
speed_multiplier = 2.5
zoom_speed = 0.7
min_fov_degrees = 0.004985
max_fov_degrees = 154.698593
pitch_limit_degrees = 88.808456

; smooth_camera_movement - camera won't stop instantly
; smooth_camera_rotation - cinematic camera rotation (like minecraft F8)
[smooth_camera_settings]
smooth_camera_movement = 1
smooth_camera_rotation = 0
sensitivity = 1.0
tilt_speed = 0.05

; Unfreeze game for "step" frames. Controlled by step_frames keybind
[frame_stepper]
step = 1

; Use Ctrl + 0-9 to save camera state
; Use 0-9 to load saved camera state
; Hold multiple keys from 0-9. When all keys are released, interpolation starts in order of press
[camera_state_manager]
interpolation_time = 3.0

; Keybind documentation: https://github.com/Logersnamed/FreecamMod/wiki	
[keybinds]
toggle = F1
reload_config = F5
reset_settings = R
exit_mod = DELETE
start/end_recording = F8
strat/end_playing_recording = F9
step_frames = F2
move_forward = W
move_backward = S
move_left = A
move_right = D
move_up = SPACE
move_down = SHIFT
sprint = LBUTTON
zoom_in = 0xBB
zoom_out = 0xBD
tilt_left = Q
tilt_right = E
scroll_zoom_modifier = CTRL
scroll_camera_speed_modifier = !CTRL