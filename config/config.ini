[mod]
debug_console = 0

[freecam]
hide_hud = 1
freeze_entities = 1
freeze_player = 1
disable_player_controls = 1
smooth_camera = 1

[experimental]
freeze_game = 0
reset_camera_settings = 1

[camera_settings]
sensitivity = 0.001000
default_speed = 10.000000
speed_multiplier = 2.500000
zoom_speed = 0.700000
min_fov = 0.005730
max_fov = 155.271561

[keybinds]
toggle = F1
reload_config = F5
reset_settings = R
exit_mod = DELETE
move_forward = W
move_backward = S
move_left = A
move_right = D
move_up = SPACE
move_down = SHIFT
sprint = LBUTTON
zoom_in = 0xBB
zoom_out = 0xBD
scroll_zoom_modifier = CTRL
scroll_camera_speed_modifier = !CTRL