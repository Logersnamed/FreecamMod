[mod]
debug_console = 0

[freecam]
hide_hud = 1
freeze_entities = 1
freeze_player = 1
disable_player_controls = 1
smooth_camera = 1

[experimental]
freeze_game = 1
reset_camera_settings = 1
always_use_custom_rotation = 1

[camera_settings]
sensitivity = 1.000000
default_speed = 10.000000
tilt_speed = 1.000000
speed_multiplier = 2.500000
zoom_speed = 0.700000
min_fov_degrees = 0.005000
max_fov_degrees = 155.000000
pitch_limit_degrees = 88.000000

[frame_stepper]
step = 1

[keybinds]
toggle = F1
reload_config = F5
reset_settings = R
exit_mod = DELETE
start/end_recording = F8
strat/end_playing_recording = F9
step_frames = F2
move_forward = W
move_backward = S
move_left = A
move_right = D
move_up = SPACE
move_down = SHIFT
sprint = LBUTTON
zoom_in = 0xBB
zoom_out = 0xBD
tilt_left = Q
tilt_right = E
scroll_zoom_modifier = CTRL
scroll_camera_speed_modifier = !CTRL