[mod]
debug_console = 0

[freecam]
hide_hud = 1
freeze_entities = 1
freeze_player = 1
disable_player_controls = 1
smooth_camera = 1

[camera_settings]
default_speed = 10.0
speed_multiplier = 2.5
zoom_speed = 0.7
min_fov = 0.0057
max_fov = 155.27

[keybinds]
toggle = F1
reload_config = F5
exit_mod = DELETE
move_forward = W
move_backward = S
move_left = A
move_right = D
move_up = SPACE
move_down = SHIFT
sprint = LBUTTON
zoom_in = 0xBB
zoom_out = 0xBD
scroll_zoom_modifier = CTRL
scroll_camera_speed_modifier = !CTRL