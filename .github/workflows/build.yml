name: Build Freecam

env:
  project_name: Freecam

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Prepare package
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path package
        New-Item -ItemType Directory -Force -Path package/Freecam

        Copy-Item build/Release/${{ env.project_name }}.dll package/
        Copy-Item config/config.ini package/Freecam/

    - name: Create zip
      shell: powershell
      run: |
        Compress-Archive -Path package/* -DestinationPath ${{ env.project_name }}.zip

    - name: Upload zip artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.project_name }}
        path: ${{ env.project_name }}.zip