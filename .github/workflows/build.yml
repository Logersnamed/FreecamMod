name: Build Freecam

permissions:
  contents: write

env:
  project_name: Freecam

on:
  push:
    branches: [ master ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Prepare package
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path package/Freecam
        Copy-Item build/Release/${{ env.project_name }}.dll package/
        Copy-Item config/config.ini package/Freecam/

    - name: Upload artifact
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.project_name }}
        path: package/*

    - name: Create release zip
      if: startsWith(github.ref, 'refs/tags/')
      shell: powershell
      run: |
        Compress-Archive -Path package/* -DestinationPath "${{ env.project_name }}-${{ github.ref_name }}.zip"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.project_name }}-${{ github.ref_name }}.zip